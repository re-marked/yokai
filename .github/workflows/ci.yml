name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @yokai/shared build

      - name: Typecheck
        run: pnpm -r typecheck

      # Lint is reported but not enforced yet. The codebase has pre-existing
      # violations (mostly stylistic + a few intentional patterns biome flags
      # as suspicious, e.g. `x !== x` for NaN detection in the Yoga port).
      # Cleanup is its own deliberate PR — see follow-up. Until then, surface
      # the report in CI logs without failing the build.
      - name: Lint (advisory)
        run: pnpm -r lint
        continue-on-error: true

      - name: Build renderer
        run: pnpm --filter @yokai/renderer build

      - name: Test
        run: pnpm test
